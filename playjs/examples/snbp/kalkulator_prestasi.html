<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Daftar Camaba SNBP</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
table{
    border-collapse: collapse;
    width:100%;
}
th,td{
    border:1px solid #ccc;
    padding:6px;
}
tr:nth-child(even){
    background:#f2f2f2;
}
button{
    padding:6px 10px;
}
</style>

</head>

<body>

<h2>Daftar Camaba</h2>

<button onclick="window.location='add.html'">Tambah Mahasiswa</button>

<table id="tableCamaba">

<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Prestasi</th>
<th>Portfolio</th>
<th>Rapor</th>
<th>Mapel1</th>
<th>Mapel2</th>
<th>Nilai Akhir</th>
</tr>
</thead>

<tbody>
</tbody>

</table>

<br>

<button id="submitAll">Finalisasi & Submit</button>

<script>

let listCamaba = JSON.parse(localStorage.getItem('camaba')) || []

function renderTable(){

    let html = ""

    listCamaba.forEach(function(row,i){

        html += `
        <tr>
        <td>${i+1}</td>
        <td>${row.nama}</td>
        <td>${row.prestasi}</td>
        <td>${row.portfolio}</td>
        <td>${row.rapor}</td>
        <td>${row.mapel1}</td>
        <td>${row.mapel2}</td>
        <td>${row.nilai_akhir}</td>
        </tr>
        `

    })

    $("#tableCamaba tbody").html(html)

}

renderTable()

$("#submitAll").click(function(){

    $.post("handler.php",{
        data: JSON.stringify(listCamaba)
    },function(res){

        alert("Data terkirim")

        localStorage.removeItem("camaba")

        location.reload()

    })

})

</script>

</body>
</html>
